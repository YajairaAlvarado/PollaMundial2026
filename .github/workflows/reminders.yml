name: Recordatorios push

on:
  schedule:
    # Horas en UTC. Ecuador es UTC-5 → 9am=14:00, 12pm=17:00, 5pm=22:00
    - cron: '0 14 * * *'
    - cron: '0 17 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch: {}   # permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Instalar dependencias
        working-directory: automation
        run: npm install
      - name: Enviar recordatorios
        working-directory: automation
        run: node send-reminders.mjs
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VAPID_PUBLIC:         ${{ secrets.VAPID_PUBLIC }}
          VAPID_PRIVATE:        ${{ secrets.VAPID_PRIVATE }}
          VAPID_SUBJECT:        ${{ secrets.VAPID_SUBJECT }}
          APP_URL:              ${{ secrets.APP_URL }}
